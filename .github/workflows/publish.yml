name: Publish to NPM

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (optional)'
        required: false
        default: ''

jobs:
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve publish version
        id: publish_version
        run: |
          EVENT_NAME="${{ github.event_name }}"
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          RELEASE_TAG="${{ github.event.release.tag_name || '' }}"

          # Get current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current package.json version: $CURRENT_VERSION"

          TARGET_VERSION="$CURRENT_VERSION"
          VERSION_CHANGED="false"

          if [ "$EVENT_NAME" = "release" ]; then
            TARGET_VERSION="${RELEASE_TAG#v}"
            echo "Using GitHub release version: $TARGET_VERSION"
          elif [ -n "$INPUT_VERSION" ]; then
            TARGET_VERSION="$INPUT_VERSION"
            echo "Using manually provided version: $TARGET_VERSION"
          else
            # Get published version from npm (suppress errors if package doesn't exist)
            PUBLISHED_VERSION=$(pnpm view maplerad-sdk version 2>/dev/null || echo "0.0.0")
            echo "Published npm version: $PUBLISHED_VERSION"

            # Function to compare versions
            compare_versions() {
              if [ "$1" = "$2" ]; then
                echo "equal"
              else
                # Use sort -V for version comparison
                SORTED=$(printf "%s\n%s" "$1" "$2" | sort -V | head -n1)
                if [ "$SORTED" = "$1" ]; then
                  echo "less"
                else
                  echo "greater"
                fi
              fi
            }

            COMPARISON=$(compare_versions "$CURRENT_VERSION" "$PUBLISHED_VERSION")
            echo "Version comparison: $COMPARISON"

            if [ "$COMPARISON" = "equal" ] || [ "$COMPARISON" = "less" ]; then
              echo "Version conflict detected. Auto-bumping version..."

              # Parse version components
              IFS='.' read -r MAJOR MINOR PATCH <<< "$PUBLISHED_VERSION"

              # Bump patch version
              NEW_PATCH=$((PATCH + 1))
              TARGET_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

              echo "New version: $TARGET_VERSION"
            else
              echo "Version is valid. Proceeding with current version."
            fi
          fi

          if [ "$TARGET_VERSION" != "$CURRENT_VERSION" ]; then
            pnpm version "$TARGET_VERSION" --no-git-tag-version
            VERSION_CHANGED="true"
          fi

          echo "version_changed=$VERSION_CHANGED" >> $GITHUB_OUTPUT
          echo "publish_version=$TARGET_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        if: steps.publish_version.outputs.version_changed == 'true'
        run: |
          git add package.json
          git commit -m "chore: set version to ${{ steps.publish_version.outputs.publish_version }} [skip ci]"
          git push origin HEAD:main

      - name: Run linter
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build project
        run: pnpm build

      - name: Publish to NPM
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish summary
        run: |
          echo "Published version ${{ steps.publish_version.outputs.publish_version }} to npm" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
